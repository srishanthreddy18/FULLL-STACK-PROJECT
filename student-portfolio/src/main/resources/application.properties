# Server Configuration
server.port=8080
spring.application.name=student-portfolio

# Database Configuration
# Using createDatabaseIfNotExist=true so you don't have to manually create the database
spring.datasource.url=jdbc:mysql://localhost:3306/student_portfolio_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sathwik@739
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Update schema automatically based on entities
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in logs for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration
# Disable cache for development
spring.thymeleaf.cache=false
