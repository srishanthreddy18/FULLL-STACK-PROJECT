# Server Configuration
server.port=8080
spring.application.name=student-portfolio

# Database Configuration
# Using createDatabaseIfNotExist=true so you don't have to manually create the database
spring.datasource.url=jdbc:mysql://localhost:3306/student_portfolio_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sathwik@739
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Update schema automatically based on entities
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in logs for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=student-portfolio-jwt-secret-key-change-this-before-production-1234567890
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=saisathwik0739@gmail.com
spring.mail.password=vgtjnnoeagqoglil
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Password reset configuration
app.password-reset.token-expiration-minutes=15

# Thymeleaf Configuration
# Disable cache for development
spring.thymeleaf.cache=false
