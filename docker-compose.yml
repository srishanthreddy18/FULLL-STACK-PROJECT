version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example_root_password
      MYSQL_DATABASE: student_portfolio_db
      MYSQL_USER: student
      MYSQL_PASSWORD: student_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - 3306:3306

  app:
    build: .
    depends_on:
      - db
    ports:
      - 8080:8080
    environment:
      DB_URL: jdbc:mysql://db:3306/student_portfolio_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: student
      DB_PASSWORD: student_password
      JWT_SECRET: change-this-secret
      MAIL_USERNAME: ''
      MAIL_PASSWORD: ''
      APP_FRONTEND_ORIGIN: http://localhost:5173
volumes:
  db_data:
